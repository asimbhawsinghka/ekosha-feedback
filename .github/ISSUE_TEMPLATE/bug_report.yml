name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-info"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I tap X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open the app
        2. Go to ...
        3. Tap ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: "e.g. Samsung Galaxy S23"
    validations:
      required: true

  - type: input
    id: android
    attributes:
      label: Android version
      placeholder: "e.g. Android 14"
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      description: Found in Settings → About
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag and drop images here if relevant.
    validations:
      required: false
